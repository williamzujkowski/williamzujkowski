name: Update Blog Posts

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    concurrency:
      group: update-blog-posts
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@2786e54a01b71aec80a5118c2bd6b5044e842597 # 1.9.6
        with:
          feed_list: "https://williamzujkowski.github.io/feed.xml"
          max_post_count: 5
          commit_message: "chore: update blog posts [skip ci]"

name: Update Terminal SVG

on:
  # Run every 6 hours: midnight, 6am, noon, 6pm EST (adjust for UTC)
  schedule:
    - cron: '0 5,11,17,23 * * *'

  # Allow manual trigger
  workflow_dispatch:

  # Run on push to config or workflow
  push:
    branches:
      - main
    paths:
      - 'terminal.yml'
      - '.github/workflows/update-terminal-svg.yml'

jobs:
  update-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Prevent multiple runs at the same time
    concurrency:
      group: update-terminal-svg
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Clone and build svg-terminal
        run: |
          git clone --depth 1 https://github.com/williamzujkowski/svg-terminal.git /tmp/svg-terminal
          cd /tmp/svg-terminal
          npm ci
          npm run build
          npm link

      - name: Generate Terminal SVG
        # --strict promotes unknown-config-key warnings to hard errors so
        # generator drift (e.g. svg-terminal renames a config key) breaks
        # the build loudly instead of silently dropping the value.
        run: svg-terminal generate --config terminal.yml --output src/terminal.svg --strict
        env:
          NODE_ENV: production
          TZ: 'America/New_York'

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet src/terminal.svg; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
        with:
          add: 'src/terminal.svg'
          message: 'chore: update terminal SVG [skip ci]'
          default_author: github_actions
          push: true

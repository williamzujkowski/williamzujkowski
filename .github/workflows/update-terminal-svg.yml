name: Update Terminal SVG

# Regenerates the profile hero terminal from terminal.yml using the published
# svg-terminal GitHub Action (williamzujkowski/svg-terminal@v1). The action
# installs the pinned npm release and runs `svg-terminal generate`, so this
# workflow no longer clones + builds the tool from source.
#
# Two outputs:
#   - src/terminal.svg         animated (default)
#   - src/terminal-static.svg  --static, served to prefers-reduced-motion users
#     via the README's <picture> element (SMIL doesn't honor that media query).

on:
  # Every 6 hours (~midnight/6/noon/6pm EST). Daily theme rotation + live data.
  schedule:
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'terminal.yml'
      - '.github/workflows/update-terminal-svg.yml'

permissions:
  contents: write

concurrency:
  group: update-terminal-svg
  cancel-in-progress: true

jobs:
  update-svg:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: America/New_York   # day-of-year theme rotation flips at EST midnight

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Generate animated terminal SVG
        uses: williamzujkowski/svg-terminal@v1
        with:
          config: terminal.yml
          output: src/terminal.svg
          # animated (static defaults to false); cache-mode normal re-fetches
          # live blocks once per run, shared with the static pass below.

      - name: Generate static fallback SVG
        uses: williamzujkowski/svg-terminal@v1
        with:
          config: terminal.yml
          output: src/terminal-static.svg
          static: 'true'   # reads the cache written by the pass above — no double fetch

      - name: Commit updated SVGs
        run: |
          set -euo pipefail
          if git diff --quiet src/terminal.svg src/terminal-static.svg; then
            echo "No SVG changes — nothing to commit."
            exit 0
          fi
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/terminal.svg src/terminal-static.svg
          git commit -m "chore: update terminal SVG [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

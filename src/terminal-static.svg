      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="core"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">

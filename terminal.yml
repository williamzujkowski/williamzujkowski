# SVG Terminal Configuration
# Generated by svg-terminal — https://github.com/williamzujkowski/svg-terminal
# Trimmed to 5 blocks for a compact profile that fits on one screen.

theme: random  # rotates daily: dracula, nord, monokai, amber, green-phosphor, cyberpunk, solarized-dark

window:
  width: 1000
  title: "william@dev-machine:~"
  autoHeight: true
  minHeight: 500
  maxHeight: 700

terminal:
  prompt: "william@dev:~$ "
  fontSize: 13
  lineHeight: 1.6

effects:
  textGlow: true
  shadow: true
  scanlines: true

fetchTimeout: 15000

blocks:
  # 1. Quick MOTD with weather
  - block: motd
    config:
      title: "WILLIAM'S DEV TERMINAL"
      subtitle: "Security • AI/ML • Homelab"
      weather:
        location: "Washington, DC"
        units: imperial

  # 2. Neofetch — the essential profile card
  - block: neofetch
    config:
      username: william
      hostname: dev-machine
      os: DadOS LTS
      shell: /bin/dad-jokes
      role: Security • AI/ML • Cloud
      languages: TypeScript, Python, Go, Rust
      uptime: "20+ years"
      terminal: dad-term 3.14

  # 3. Dad joke — the signature block
  - block: dad-joke
    config:
      jokes:
        - q: "Why do programmers prefer dark mode?"
          a: "Because light attracts bugs!"
          category: classic
        - q: "Why did the developer go broke?"
          a: "Because he used up all his cache!"
          category: money
        - q: "How many programmers does it take to change a light bulb?"
          a: "None. It's a hardware problem!"
          category: classic
        - q: "Why do Java developers wear glasses?"
          a: "Because they don't C#!"
          category: languages
        - q: "How do you comfort a JavaScript bug?"
          a: "You console it!"
          category: javascript
        - q: "Why was the function sad after a break up?"
          a: "It had no closure!"
          category: javascript
        - q: "What's the object-oriented way to become wealthy?"
          a: "Inheritance!"
          category: oop
        - q: "Why do programmers always mix up Halloween and Christmas?"
          a: "Because Oct 31 == Dec 25!"
          category: classic
        - q: "Why did the LLM go to therapy?"
          a: "It had too many hallucinations!"
          category: llm
        - q: "How do transformers say goodbye?"
          a: "Attention, I must go!"
          category: ml
        - q: "What's Claude's favorite food?"
          a: "Token soup with a side of context!"
          category: llm

  # 4. GitHub stats (live)
  - block: github-stats
    config:
      username: williamzujkowski

  # 5. Goodbye
  - block: goodbye

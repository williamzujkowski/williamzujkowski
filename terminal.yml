# svg-terminal profile config — William Zujkowski
# Hero terminal for the GitHub profile README, generated by svg-terminal v1.2.x
# (https://github.com/williamzujkowski/svg-terminal). 8 curated blocks showcasing
# the tool's range: live weather + GitHub data, a multi-line animation, and the
# persona. Daily theme rotation across all 20 themes, crisp (no glow/scanlines).
# Sized to fit fully in both the animated and the reduced-motion static fallback.
# Refreshed every 6 hours by .github/workflows/update-terminal-svg.yml.

theme: random  # daily rotation across all 20 built-in themes

window:
  width: 980
  title: "william@homelab: ~/profile"
  autoHeight: true
  minHeight: 520
  maxHeight: 1500

terminal:
  prompt: "william@homelab:~$ "
  fontSize: 13
  lineHeight: 1.6

effects:
  textGlow: false
  scanlines: false
  shadow: true

# Both weather + the two GitHub blocks hit the network; 15s is comfortable.
fetchTimeout: 15000

# Cache lives next to this file. Refresh on each scheduled run (every 6h),
# so a long TTL would just hide drift — keep it matched to the cadence.
cacheTTL: 21600  # 6 hours

accessibility:
  describe: true

accessibilityLabel: "William Zujkowski's GitHub profile terminal — security engineer, multi-agent AI builder (nexus-agents), basement-datacenter homelabber in southern PA, and dad-joke connoisseur. A playful animated terminal session with live weather, live GitHub stats and languages, and a rotating dad joke. The theme rotates daily."

blocks:
  # 1. MOTD with live weather — opens with a hello + a glanceable signal.
  - block: motd
    config:
      title: "WILLIAM'S DEV TERMINAL"
      subtitle: "Security • Multi-Agent AI • Homelab • Dad Jokes"
      weather:
        location: "Harrisburg, PA"
        units: imperial

  # 2. Neofetch — the persona identity card (centerpiece).
  - block: neofetch
    config:
      username: william
      hostname: homelab
      os: "DadOS LTS (Linux + Coffee)"
      shell: "/bin/dad-jokes"
      editor: "nvim (btw)"
      role: "Security Engineer • Multi-Agent AI • Homelabber"
      location: "southern PA — basement datacenter"
      languages: "TypeScript, Python, Go, Rust"
      uptime: "20+ years (one continuous session)"

  # 3. Build badge — playful "status of william" card. Mostly green, one honest warn.
  - block: build-badge
    config:
      command: "status --me"
      badges:
        - { label: "nexus-agents",    status: "ok",   value: "online · multi-model" }
        - { label: "homelab",         status: "ok",   value: "racks healthy"         }
        - { label: "vuln-briefing",   status: "ok",   value: "shipped"               }
        - { label: "coffee",          status: "warn", value: "refill required"       }
        - { label: "dad-joke buffer", status: "ok",   value: "overflowing"           }

  # 4. GitHub stats (live, cached).
  - block: github-stats
    config:
      username: williamzujkowski

  # 5. GitHub languages (live, cached) — top-language breakdown bars.
  - block: github-languages
    config:
      username: williamzujkowski
      top: 6
      command: "gh lang --top 6"
      fallback:
        - { name: "TypeScript", percent: 42 }
        - { name: "Python",     percent: 31 }
        - { name: "Go",         percent: 14 }
        - { name: "Rust",       percent: 9  }
        - { name: "Shell",      percent: 4  }

  # 6. Jumping jack — the multi-line animated block (svg-terminal v1.1 flagship). Show it off.
  - block: jumping-jack
    config:
      command: "exercise --dad"
      fps: 3
      color: green

  # 7. Dad joke — the signature block. Daily rotation through the list.
  - block: dad-joke
    config:
      command: "fortune | dad"
      jokes:
        - q: "Why do programmers prefer dark mode?"
          a: "Because light attracts bugs!"
          category: classic
        - q: "Why did the developer go broke?"
          a: "Because he used up all his cache!"
          category: money
        - q: "How many programmers does it take to change a light bulb?"
          a: "None. It's a hardware problem!"
          category: classic
        - q: "Why do Java developers wear glasses?"
          a: "Because they don't C#!"
          category: languages
        - q: "How do you comfort a JavaScript bug?"
          a: "You console it!"
          category: javascript
        - q: "Why was the function sad after the break up?"
          a: "It had no closure!"
          category: javascript
        - q: "Why did the LLM go to therapy?"
          a: "It had too many hallucinations!"
          category: ai
        - q: "How do transformers say goodbye?"
          a: "Attention, I must go!"
          category: ai
        - q: "Why don't AI agents play poker?"
          a: "They keep leaking their chain of thought."
          category: ai
        - q: "Why did the security engineer refuse to play hide and seek?"
          a: "Good luck hiding when she's running nmap!"
          category: security
        - q: "Why did the pentester bring a ladder to work?"
          a: "To escalate privileges!"
          category: security
        - q: "What do you call a CVE that nobody patches?"
          a: "An invitation."
          category: security
        - q: "What did the firewall say to the packet?"
          a: "DROP it like it's hot."
          category: security
        - q: "Why did the homelabber buy a fourth UPS?"
          a: "The other three were just for redundancy."
          category: homelab
        - q: "How does a sysadmin propose?"
          a: "With a ring0."
          category: homelab
        - q: "Why did the developer move to the country?"
          a: "Too many race conditions in the city."
          category: classic

  # 8. Goodbye — a clean, on-brand exit.
  - block: goodbye
    config:
      command: "logout"
      lines:
        - ""
        - "Thanks for stopping by — may your builds stay green,"
        - "your agents stay aligned, and your coffee stay hot."
        - ""
        - "See you in the commits."

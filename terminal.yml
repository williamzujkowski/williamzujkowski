# SVG Terminal Configuration
# Generated by svg-terminal v0.8 — https://github.com/williamzujkowski/svg-terminal
# 7 blocks: 1 dynamic (motd weather), 1 animated (heartbeat), 1 GitHub-live, 4 static.
# Stays compact (fits on one screen), refreshes every 6 hours.

theme: random  # daily rotation: dracula, nord, monokai, amber, green-phosphor, cyberpunk, solarized-dark, win95

window:
  width: 1000
  title: "william@dev-machine:~"
  autoHeight: true
  minHeight: 500
  maxHeight: 720

terminal:
  prompt: "william@dev:~$ "
  fontSize: 13
  lineHeight: 1.6

chrome:
  titleFontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif"
  titleFontSize: 13

effects:
  textGlow: true
  shadow: true
  scanlines: true

# Dynamic block budget. Weather + github-stats both hit the network; 15s is plenty.
fetchTimeout: 15000

# Cache lives next to this file. We re-fetch each scheduled run (every 6h),
# so a long TTL would just hide drift — keep it modest.
cacheTTL: 21600  # 6 hours, matches the workflow cadence

# Screen-reader description in the SVG payload — useful for the GitHub profile.
accessibility:
  describe: true

blocks:
  # 1. MOTD with live weather — opens the terminal with a hello + a glanceable signal.
  - block: motd
    config:
      title: "WILLIAM'S DEV TERMINAL"
      subtitle: "Security • AI/ML • Homelab • Dad Jokes"
      weather:
        location: "Washington, DC"
        units: imperial

  # 2. Neofetch — the persona card. Updated to reflect actual tools in rotation.
  - block: neofetch
    config:
      username: william
      hostname: dev-machine
      os: DadOS LTS (Linux + Coffee)
      shell: /bin/dad-jokes
      editor: nvim
      role: Security Engineer • Multi-Agent AI • Homelabber
      location: southern PA, basement-datacenter
      languages: TypeScript, Python, Go, Rust
      uptime: "20+ years (one continuous session)"

  # 3. Build-badge — playful "status of william" card. Mostly green, one warn for honesty.
  - block: build-badge
    config:
      command: "status --me"
      badges:
        - { label: "nexus-agents",    status: "ok",   value: "online · 15 models" }
        - { label: "homelab",         status: "ok",   value: "BOSH + CF healthy"  }
        - { label: "vuln-bot",        status: "ok",   value: "briefing shipped"   }
        - { label: "coffee",          status: "warn", value: "refill required"    }
        - { label: "dad-joke buffer", status: "ok",   value: "overflowing"        }

  # 4. Heartbeat — one animated block sets the vibe without bloating the SVG.
  - block: heartbeat
    config:
      label: "built with care (and caffeine)"
      color: red
      fps: 4
      command: "uptime --emotional"

  # 5. Dad joke — the signature block. Daily rotation through the list.
  - block: dad-joke
    config:
      jokes:
        - q: "Why do programmers prefer dark mode?"
          a: "Because light attracts bugs!"
          category: classic
        - q: "Why did the developer go broke?"
          a: "Because he used up all his cache!"
          category: money
        - q: "How many programmers does it take to change a light bulb?"
          a: "None. It's a hardware problem!"
          category: classic
        - q: "Why do Java developers wear glasses?"
          a: "Because they don't C#!"
          category: languages
        - q: "How do you comfort a JavaScript bug?"
          a: "You console it!"
          category: javascript
        - q: "Why was the function sad after a break up?"
          a: "It had no closure!"
          category: javascript
        - q: "What's the object-oriented way to become wealthy?"
          a: "Inheritance!"
          category: oop
        - q: "Why do programmers always mix up Halloween and Christmas?"
          a: "Because Oct 31 == Dec 25!"
          category: classic
        - q: "Why did the LLM go to therapy?"
          a: "It had too many hallucinations!"
          category: llm
        - q: "How do transformers say goodbye?"
          a: "Attention, I must go!"
          category: ml
        - q: "What's Claude's favorite food?"
          a: "Token soup with a side of context!"
          category: llm
        - q: "Why did the security engineer refuse to play hide and seek?"
          a: "Good luck hiding when she's running nmap!"
          category: security
        - q: "Why did the pentester bring a ladder to work?"
          a: "To escalate privileges!"
          category: security
        - q: "What do you call a CVE that nobody patches?"
          a: "An invitation."
          category: security
        - q: "Why did the homelabber buy a fourth UPS?"
          a: "The other three were just for redundancy."
          category: homelab
        - q: "How does a sysadmin propose?"
          a: "With a ring0."
          category: kernel
        - q: "Why don't AI agents play poker?"
          a: "They keep leaking their chain of thought."
          category: llm
        - q: "What did the firewall say to the packet?"
          a: "DROP it like it's hot."
          category: security
        - q: "Why did the developer move to the country?"
          a: "Too many race conditions in the city."
          category: classic

  # 6. GitHub stats (live, cached).
  - block: github-stats
    config:
      username: williamzujkowski

  # 7. Goodbye — a clean exit. Default works great.
  - block: goodbye
